app = 'thalassaxir'
primary_region = 'iad'

[build]

[deploy]
  # No release command - app doesn't use a database

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  PHX_HOST = "thalassaxir.com"
  PORT = "4000"
